<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirects — Admin</title>
  <link rel="stylesheet" href="../../../app.css" />
  <script>(function(){try{
const sidebarState = localStorage.getItem('admin-sidebar') || 'open';
document.documentElement.setAttribute('data-sidebar', sidebarState);var t=localStorage.getItem('admin-theme')||'system';var d=window.matchMedia('(prefers-color-scheme:dark)').matches;var dark=(t==='dark')||(t==='system'&&d);document.documentElement.setAttribute('data-theme',dark?'dark':'light');}catch(e){}})();</script>
  <style>
[data-sidebar="collapsed"] .sidebar { width: 0; overflow: hidden; padding: 0; border: none; }
[data-sidebar="collapsed"] .sidebar-label { display: none; }
@media (max-width: 1023px) { .sidebar { display: none; } .sidebar.mobile-open { display: flex; position: fixed; z-index: 40; top: 0; left: 0; height: 100vh; width: 16rem; background: var(--backgroundPrimary, #fff); } }
</style>
</head>
<body class="min-h-screen flex">
  <div class="sidebar sidebar-sticky w-64 shrink-0 border-r border-border/30">
    <div class="p-4 border-b border-border/30">
      <a href="/flatspace/admin/" class="font-semibold text-base text-content1 sidebar-label">Flatspace</a>
      <button id="sidebar-toggle" class="btn btn-ghost btn-xs ml-auto sidebar-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19l-7-7 7-7M18 19l-7-7 7-7"/></svg>
      </button>
    </div>
    <nav class="menu p-3 flex-1 overflow-y-auto">
      <ul class="menu-items">
        <li class="menu-item"><a href="/flatspace/admin/" class="w-full">Dashboard</a></li>
        <li><span class="menu-title px-2 mt-3">Collections</span></li>
        <li class="menu-item"><a href="/flatspace/admin/collections/categories/" class="w-full">Categories</a></li><li class="menu-item"><a href="/flatspace/admin/collections/media/" class="w-full">Media</a></li><li class="menu-item"><a href="/flatspace/admin/collections/pages/" class="w-full">Pages</a></li><li class="menu-item"><a href="/flatspace/admin/collections/posts/" class="w-full">Posts</a></li>
        </ul>
    </nav>
  </div>
  <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
    <header class="navbar bg-backgroundSecondary border-b border-border/30 h-14 px-6 shrink-0">
      <div class="navbar-start gap-2">
        <button id="mobile-menu" class="btn btn-ghost btn-sm lg:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <nav class="text-sm text-content2 flex items-center gap-1"><a href="/flatspace/admin/" class="hover:text-content1">Dashboard</a> <span class="text-content3">/</span> Redirects</nav>
      </div>
      <div class="navbar-end gap-4">
        <button class="btn btn-ghost btn-sm text-content2 gap-1"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span class="hidden md:inline text-xs">Search</span><kbd class="hidden md:inline text-[10px] bg-muted px-1 rounded">⌘K</kbd></button>
        <a href="/flatspace/" target="_blank" class="text-sm text-content2 hover:text-content1 transition-colors">View Site ↗</a>
        <button id="admin-theme-toggle" class="btn btn-ghost btn-sm">
          <svg class="dark-icon hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          <svg class="light-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto p-6">
  <div style="background:#f59e0b;color:#1c1917;padding:0.4rem 1rem;font-size:0.8rem;font-weight:600;text-align:center;">Read-only preview — <a href="https://github.com/AnEntrypoint/flatspace" style="text-decoration:underline;">run locally</a> to edit content</div>
      
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-content1">Redirects</h1>
  
</div>
<form method="get" class="mb-4 flex gap-2 max-w-sm">
  <input name="search" value="" placeholder="Search..." class="input input-solid input-sm flex-1" />
  <button type="submit" class="btn btn-outline btn-sm">Search</button>
</form>
<div id="bulk-bar" class="hidden flex items-center gap-3 mb-3 p-3 bg-backgroundSecondary border border-border/30 rounded">
  <span class="text-sm"><span id="bulk-count">0</span> selected</span>
  <button type="button" class="btn btn-error btn-sm">Delete Selected</button>
</div>
<div class="card bg-backgroundSecondary border border-border/30 overflow-hidden">
  <div class="overflow-x-auto">
    <table class="table w-full">
      <thead class="bg-backgroundPrimary"><tr><th class="w-10 px-3 py-3"><input type="checkbox" class="checkbox checkbox-sm" id="select-all" onchange="document.querySelectorAll('.row-check').forEach(c=>{c.checked=this.checked});document.getElementById('bulk-bar').classList.toggle('hidden',!this.checked)" /></th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-content2"><a href="?sort=from" class="hover:text-content1">From</a></th><th class="w-10 px-3 py-3"><input type="checkbox" class="checkbox checkbox-sm" id="select-all" onchange="document.querySelectorAll('.row-check').forEach(c=>{c.checked=this.checked});document.getElementById('bulk-bar').classList.toggle('hidden',!this.checked)" /></th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-content2"><a href="?sort=to" class="hover:text-content1">To</a></th><th class="w-10 px-3 py-3"><input type="checkbox" class="checkbox checkbox-sm" id="select-all" onchange="document.querySelectorAll('.row-check').forEach(c=>{c.checked=this.checked});document.getElementById('bulk-bar').classList.toggle('hidden',!this.checked)" /></th><th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-content2"><a href="?sort=updatedAt" class="hover:text-content1 text-primary">Updated At ↓</a></th></tr></thead>
      <tbody><tr><td colspan="3" class="px-4 py-10 text-center text-content3" colspan="99">No Redirects found</td></tr></tbody>
    </table>
  </div>
</div>

    </main>
  </div>
  <script defer src="/admin/richtext.js"></script>
  
  <script defer src="/admin/search.js"></script>
  <script defer src="/admin/drawer.js"></script>
  <script defer src="/admin/preview.js"></script>
</body>
</html>
