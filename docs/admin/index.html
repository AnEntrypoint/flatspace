<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Admin</title>
  <link rel="stylesheet" href="../app.css" />
  <script>(function(){try{var t=localStorage.getItem('admin-theme')||'system';var d=window.matchMedia('(prefers-color-scheme:dark)').matches;var dark=(t==='dark')||(t==='system'&&d);document.documentElement.setAttribute('data-theme',dark?'dark':'light');}catch(e){}})();</script>
</head>
<body class="min-h-screen flex">
  <div class="sidebar sidebar-sticky w-64 shrink-0 border-r border-border/30">
    <div class="p-4 border-b border-border/30">
      <a href="/flatload/admin/" class="font-semibold text-base text-content1">Flatload Admin</a>
    </div>
    <nav class="menu p-3 flex-1">
      <ul class="menu-items">
        <li class="menu-item">
          <a href="/flatload/admin/" class="w-full">Dashboard</a>
        </li>
        <li><span class="menu-title px-2 mt-3">Collections</span></li>
        <li class="menu-item"><a href="/flatload/admin/collections/pages/" class="w-full">Pages</a></li>
        <li class="menu-item"><a href="/flatload/admin/collections/posts/" class="w-full">Posts</a></li>
        <li class="menu-item"><a href="/flatload/admin/collections/media/" class="w-full">Media</a></li>
        <li class="menu-item"><a href="/flatload/admin/collections/categories/" class="w-full">Categories</a></li>
        <li class="menu-item"><a href="/flatload/admin/collections/users/" class="w-full">Users</a></li>
      </ul>
    </nav>
    <div class="p-4 border-t border-border/30 text-xs text-content3">
      <div class="mb-2 truncate">demo@flatload.io</div>
      
    </div>
  </div>
  <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
    <header class="navbar bg-backgroundSecondary border-b border-border/30 h-14 px-6 shrink-0">
      <div class="navbar-start">
        <span class="text-sm text-content2"></span>
      </div>
      <div class="navbar-end gap-4">
        <a href="/flatload/" target="_blank" class="text-sm text-content2 hover:text-content1 transition-colors">View Site ↗</a>
        <button id="admin-theme-toggle" class="btn btn-ghost btn-sm">
          <svg class="dark-icon hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          <svg class="light-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto p-6">
  <div style="background:#f59e0b;color:#1c1917;padding:0.4rem 1rem;font-size:0.8rem;font-weight:600;text-align:center;">Read-only preview — <a href="https://github.com/AnEntrypoint/flatload" style="text-decoration:underline;">run locally</a> to edit content</div>
      
<div class="mb-6">
  <h1 class="text-2xl font-bold text-content1">Dashboard</h1>
  <p class="text-content2 text-sm mt-1">Welcome back, Demo</p>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
  
<a href="/flatload/admin/collections/pages/" class="card bg-backgroundSecondary border border-border/30 hover:shadow-md transition-shadow">
  <div class="card-body">
    <p class="text-content2 text-sm">Pages</p>
    <p class="text-3xl font-bold mt-1 text-content1">2</p>
  </div>
</a>
<a href="/flatload/admin/collections/posts/" class="card bg-backgroundSecondary border border-border/30 hover:shadow-md transition-shadow">
  <div class="card-body">
    <p class="text-content2 text-sm">Posts</p>
    <p class="text-3xl font-bold mt-1 text-content1">3</p>
  </div>
</a>
<a href="/flatload/admin/collections/media/" class="card bg-backgroundSecondary border border-border/30 hover:shadow-md transition-shadow">
  <div class="card-body">
    <p class="text-content2 text-sm">Media</p>
    <p class="text-3xl font-bold mt-1 text-content1">4</p>
  </div>
</a>
<a href="/flatload/admin/collections/categories/" class="card bg-backgroundSecondary border border-border/30 hover:shadow-md transition-shadow">
  <div class="card-body">
    <p class="text-content2 text-sm">Categories</p>
    <p class="text-3xl font-bold mt-1 text-content1">6</p>
  </div>
</a>
<a href="/flatload/admin/collections/users/" class="card bg-backgroundSecondary border border-border/30 hover:shadow-md transition-shadow">
  <div class="card-body">
    <p class="text-content2 text-sm">Users</p>
    <p class="text-3xl font-bold mt-1 text-content1">1</p>
  </div>
</a>
<a href="/flatload/admin/collections/forms/" class="card bg-backgroundSecondary border border-border/30 hover:shadow-md transition-shadow">
  <div class="card-body">
    <p class="text-content2 text-sm">Forms</p>
    <p class="text-3xl font-bold mt-1 text-content1">1</p>
  </div>
</a>
<a href="/flatload/admin/collections/redirects/" class="card bg-backgroundSecondary border border-border/30 hover:shadow-md transition-shadow">
  <div class="card-body">
    <p class="text-content2 text-sm">Redirects</p>
    <p class="text-3xl font-bold mt-1 text-content1">0</p>
  </div>
</a>
</div>
<div class="mt-8 card bg-backgroundSecondary border border-border/30">
  <div class="card-body">
    <h2 class="font-semibold text-base mb-3 text-content1">Quick Links</h2>
    <div class="flex flex-wrap gap-2">
      
      
      </div>
  </div>
</div>
    </main>
  </div>
  
</body>
</html>
