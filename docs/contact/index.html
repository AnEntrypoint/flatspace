<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Flatload</title>
  
  
  <meta property="og:title" content="Contact | Flatload" />
  <meta property="og:type" content="website" />
  
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact | Flatload" />
  
  <link rel="stylesheet" href="../app.css" />
  <script>(function(){try{var t=localStorage.getItem('theme')||'system';var d=window.matchMedia('(prefers-color-scheme:dark)').matches;var dark=(t==='dark')||(t==='system'&&d);document.documentElement.setAttribute('data-theme',dark?'dark':'light');var di=document.querySelectorAll('.dark-icon');var li=document.querySelectorAll('.light-icon');di.forEach(function(el){if(dark)el.classList.remove('hidden');else el.classList.add('hidden');});li.forEach(function(el){if(dark)el.classList.add('hidden');else el.classList.remove('hidden');});}catch(e){}})();</script>
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col">
  
  
<header class="sticky top-0 z-40 w-full border-b border-border bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
  <div class="container flex h-16 items-center justify-between gap-4">
    <a href="/flatspace/" class="font-bold text-xl tracking-tight text-primary">Flatspace</a>
    <nav class="hidden md:flex items-center gap-6">
      <a href="/flatspace/posts" class="text-sm font-medium hover:text-primary transition-colors">Posts</a><a href="/flatspace/contact" class="text-sm font-medium hover:text-primary transition-colors">Contact</a>
      <button id="theme-toggle" aria-label="Toggle theme" class="hover:text-primary transition-colors">
        <svg class="dark-icon hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="light-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </nav>
    <div class="flex md:hidden items-center gap-3">
      <button id="theme-toggle-mobile" aria-label="Toggle theme" class="hover:text-primary transition-colors">
        <svg class="dark-icon hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="light-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button id="mobile-menu-toggle" aria-label="Open menu" class="hover:text-primary transition-colors">
        <svg class="menu-open-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        <svg class="menu-close-icon hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </div>
  <div id="mobile-menu" class="hidden md:hidden border-t border-border bg-background">
    <nav class="container flex flex-col py-4 gap-4">
      <a href="/flatspace/posts" class="text-sm font-medium hover:text-primary transition-colors">Posts</a><a href="/flatspace/contact" class="text-sm font-medium hover:text-primary transition-colors">Contact</a>
    </nav>
  </div>
</header>
  <main class="flex-1">
    
<section class="my-8">
  <div class="prose max-w-none mb-6"><h2>Contact us</h2><p>Have a question or want to get in touch? Fill out the form below and we will get back to you as soon as possible.</p></div>
  <form
    class="bg-card border border-border rounded-lg p-6 max-w-xl"
    data-form-id="contact-form"
    data-success-url=""
    data-confirm-html="%3Ch2%3EThe%20contact%20form%20has%20been%20submitted%20successfully.%3C%2Fh2%3E"
  >
    <div class="mb-4"><label for="full-name" class="block text-sm font-medium mb-1">Full Name<span class="text-error ml-1">*</span></label><input type="text" id="full-name" name="full-name" class="w-full border border-input rounded px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring" required /></div><div class="mb-4"><label for="email" class="block text-sm font-medium mb-1">Email<span class="text-error ml-1">*</span></label><input type="email" id="email" name="email" class="w-full border border-input rounded px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring" required /></div><div class="mb-4"><label for="phone" class="block text-sm font-medium mb-1">Phone</label><input type="number" id="phone" name="phone" class="w-full border border-input rounded px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring" /></div><div class="mb-4"><label for="message" class="block text-sm font-medium mb-1">Message<span class="text-error ml-1">*</span></label><textarea id="message" name="message" rows="4" class="w-full border border-input rounded px-3 py-2 bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring" required></textarea></div>
    <button type="submit" class="bg-primary text-primary-foreground px-6 py-2 rounded hover:opacity-90 transition-opacity w-full">
      Submit
    </button>
    <div class="form-message hidden mt-4 p-3 rounded text-sm"></div>
  </form>
</section>
  </main>
  
<footer class="border-t border-border mt-auto bg-background">
  <div class="container py-8 flex flex-col md:flex-row items-center justify-between gap-4">
    <p class="text-sm text-muted-foreground">&copy; 2026 Flatspace</p>
    <nav class="flex flex-wrap gap-6"><a href="/flatspace/admin" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Admin</a><a href="https://github.com/AnEntrypoint/flatspace" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Source Code</a></nav>
  </div>
</footer>
  <script type="module" src="../client.js"></script>
</body>
</html>
