<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flatload — Flat-file CMS</title>
  
  
  <meta property="og:title" content="Flatload — Flat-file CMS" />
  <meta property="og:type" content="website" />
  
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Flatload — Flat-file CMS" />
  
  <link rel="stylesheet" href="./app.css" />
  <script>(function(){try{var t=localStorage.getItem('theme')||'system';var d=window.matchMedia('(prefers-color-scheme:dark)').matches;var dark=(t==='dark')||(t==='system'&&d);document.documentElement.setAttribute('data-theme',dark?'dark':'light');var di=document.querySelectorAll('.dark-icon');var li=document.querySelectorAll('.light-icon');di.forEach(function(el){if(dark)el.classList.remove('hidden');else el.classList.add('hidden');});li.forEach(function(el){if(dark)el.classList.add('hidden');else el.classList.remove('hidden');});}catch(e){}})();</script>
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col">
  
  
<header class="sticky top-0 z-40 w-full border-b border-border bg-background/95 backdrop-blur supports-[backdrop-filter]:bg-background/60">
  <div class="container flex h-16 items-center justify-between gap-4">
    <a href="/flatload/" class="font-bold text-xl tracking-tight text-primary">Flatload</a>
    <nav class="hidden md:flex items-center gap-6">
      <a href="/flatload/posts" class="text-sm font-medium hover:text-primary transition-colors">Posts</a><a href="/flatload/contact" class="text-sm font-medium hover:text-primary transition-colors">Contact</a>
      <a href="/flatload/search" aria-label="Search" class="hover:text-primary transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </a>
      <button id="theme-toggle" aria-label="Toggle theme" class="hover:text-primary transition-colors">
        <svg class="dark-icon hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="light-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </nav>
    <div class="flex md:hidden items-center gap-3">
      <button id="theme-toggle-mobile" aria-label="Toggle theme" class="hover:text-primary transition-colors">
        <svg class="dark-icon hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="light-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button id="mobile-menu-toggle" aria-label="Open menu" class="hover:text-primary transition-colors">
        <svg class="menu-open-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        <svg class="menu-close-icon hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
  </div>
  <div id="mobile-menu" class="hidden md:hidden border-t border-border bg-background">
    <nav class="container flex flex-col py-4 gap-4">
      <a href="/flatload/posts" class="text-sm font-medium hover:text-primary transition-colors">Posts</a><a href="/flatload/contact" class="text-sm font-medium hover:text-primary transition-colors">Contact</a>
      <a href="/flatload/search" class="text-sm font-medium hover:text-primary transition-colors">Search</a>
    </nav>
  </div>
</header>
  <main class="flex-1">
    
<section class="hero-section relative min-h-[70vh] md:min-h-[80vh] flex items-end overflow-hidden">
  <div class="absolute inset-0 bg-slate-900"></div>
  <div class="absolute inset-0 opacity-50"><img src="https://picsum.photos/seed/hero1/1400/800" alt="Hero image" class="absolute inset-0 w-full h-full object-cover" loading="eager" /></div>
  <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
  <div class="relative container py-12 md:py-20 lg:py-28">
    <div class="hero-content max-w-3xl text-white">
      <h1>Flatload</h1><p>A flat-file CMS — edit YAML, push to git, deploy to GitHub Pages.</p>
    </div>
    <div class="flex flex-wrap gap-3 mt-8"><a href="/flatload/posts" class="inline-flex items-center bg-white text-gray-900 px-6 py-3 rounded-lg hover:bg-white/90 transition-opacity font-medium shadow-sm">All posts</a><a href="/flatload/contact" class="inline-flex items-center border-2 border-white/80 text-white px-6 py-3 rounded-lg hover:bg-white/10 transition-colors font-medium">Contact</a></div>
  </div>
</section>
  </main>
  
<footer class="border-t border-border mt-auto bg-background">
  <div class="container py-8 flex flex-col md:flex-row items-center justify-between gap-4">
    <p class="text-sm text-muted-foreground">&copy; 2026 Flatload</p>
    <nav class="flex flex-wrap gap-6"><a href="/flatload/admin" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Admin</a><a href="https://github.com/AnEntrypoint/flatload" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Source Code</a></nav>
  </div>
</footer>
  <script type="module" src="./client.js"></script>
</body>
</html>
